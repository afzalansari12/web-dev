<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> bounce animation </title>
    <style>

        .circle{
            background-color: yellow;
            border-radius: 70px;
            height: 121px;
            width: 121px;
            position: absolute;
            left: 0;
            bottom:0;
        
          }
          
        .box{
            background-color: #7a0707;
            height: 80vh;
            width: 80vw;
            position: relative;
           
        }
       
    </style>
</head>
<body>
     <div class="box">
      <div class="circle">
         
        </div>   
     </div>
     

</body>
</html>
